# ISO/TC 211 LXR build template
# Shared metadata, mappings, and appearance for all LXR packages.
# Per-package config is generated by prepending the `files:` list.

metadata:
  title: "ISO/TC 211 Schema Browser"
  description: >
    Interactive documentation browser for ISO/TC 211 Geographic Information
    XML Schema Definitions (XSD).
  license: "CC-BY-4.0"
  license_url: "https://creativecommons.org/licenses/by/4.0/"
  authors:
    - name: "ISO/TC 211"
      email: "iso@isotc211.org"
  homepage: "https://isotc211.org/"
  repository: "https://github.com/ISO-TC211/schemas"
  documentation: "https://schemas.isotc211.org/"
  tags:
    - iso
    - tc211
    - geographic-information
    - geomatics
    - gml
    - xsd
  links:
    - name: "Homepage"
      url: "https://isotc211.org/"
    - name: "Schema Repository"
      url: "https://github.com/ISO-TC211/schemas"
    - name: "Schema Browser"
      url: "https://schemas.isotc211.org/"

build:
  xsd_mode: include_all
  resolution_mode: resolved
  serialization_format: marshal

schema_location_mappings:
  # Map double-schemas URL pattern (some schemas use schemas.isotc211.org/schemas/...)
  - from: "^https://schemas\\.isotc211\\.org/schemas/(.+)$"
    to: "\\1"
    pattern: true

  # Map legacy 19110 paths without dash (19110/fcc/ vs 19110/-/fcc/)
  - from: "^https://schemas\\.isotc211\\.org/19110/(fcc|gfc)/(.+)$"
    to: "19110/-/\\1/\\2"
    pattern: true

  # Map schemas.isotc211.org URLs to local files
  - from: "^https://schemas\\.isotc211\\.org/(.+)$"
    to: "\\1"
    pattern: true

  # Map GML 3.2.1 HTTP URLs to local copy
  - from: "^https://schemas\\.opengis\\.net/gml/3\\.2\\.1/(.+\\.xsd)$"
    to: "19136/-/gml/1.0/\\1"
    pattern: true

  # Map legacy ISO GML URL
  - from: "^http://standards\\.iso\\.org/ittf/PubliclyAvailableStandards/ISO_19136_Schemas/(.+\\.xsd)$"
    to: "19136/-/gml/1.0/\\1"
    pattern: true

namespace_mappings:
  - prefix: "xs"
    uri: "http://www.w3.org/2001/XMLSchema"
  - prefix: "gml"
    uri: "http://www.opengis.net/gml/3.2"
  - prefix: "xlink"
    uri: "http://www.w3.org/1999/xlink"

appearance:
  logos:
    square:
      light:
        url: "https://www.isotc211.org/assets/iso-red.svg"
      dark:
        url: "https://www.isotc211.org/assets/iso-red.svg"
    long:
      light:
        url: "https://www.isotc211.org/assets/iso-red.svg"
      dark:
        url: "https://www.isotc211.org/assets/iso-red.svg"
    icon:
      light:
        url: "https://www.isotc211.org/assets/iso-red.svg"
      dark:
        url: "https://www.isotc211.org/assets/iso-red.svg"
  colors:
    primary: "#0062cc"
    primary_light: "#3388dd"
    primary_dark: "#004999"
    accent: "#e8a020"
    background_primary: "#ffffff"
    background_secondary: "#f7f9fc"
  typography:
    font_family: "system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    mono_font_family: "'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', 'Source Code Pro', monospace"
